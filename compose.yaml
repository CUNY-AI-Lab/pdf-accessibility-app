services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_APP_BASE_PATH: ${VITE_APP_BASE_PATH:-/}
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite+aiosqlite:////app/data/pdf_accessibility.db
      UPLOAD_DIR: /app/data/uploads
      PROCESSING_DIR: /app/data/processing
      OUTPUT_DIR: /app/data/output
    volumes:
      - pdf_accessibility_data:/app/data
      - pdf_accessibility_cache:/home/app/.cache
    ports:
      - "${APP_PORT:-8080}:8001"
    stop_grace_period: 1m
    restart: unless-stopped

volumes:
  pdf_accessibility_data:
  pdf_accessibility_cache:
